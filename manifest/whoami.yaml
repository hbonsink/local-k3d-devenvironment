---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: whoami
  name: whoami
spec:
  replicas: 1
  selector:
    matchLabels:
      app: whoami
  template:
    metadata:
      labels:
        app: whoami
    spec:
      containers:
        - image: traefik/whoami:latest
          name: whoami
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: whoami-svc
spec:
  type: ClusterIP
  selector:
    app: whoami
  ports:
    - port: 80
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: whoami-route
spec:
  parentRefs:
  - name: traefik-gateway
    sectionName: web # Matches the listener name in Traefik's Gateway configuration
    kind: Gateway
    namespace: kube-system
  - name: traefik-gateway-secure
    sectionName: websecure # Matches the listener name in Traefik's Gateway configuration
    kind: Gateway
    namespace: kube-system
  hostnames:
  - "whoami.${DOMAIN}" # Filters traffic by hostname
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - name: whoami-svc
      port: 80
      weight: 1 # 100% of traffic here if only one backend

